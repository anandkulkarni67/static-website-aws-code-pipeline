AWSTemplateFormatVersion: '2010-09-09'
Description: 'A template to create resources for a static website'

Parameters:
  ApplicationName:
    Type: String
    Default: 'static-website-aws-code-pipeline'
  GithubUserName:
    Type: String
  GithubRepositoryName:
    Type: String

Resources:
  CodeBuildProjectBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Artifacts:
        Type: CODEPIPELINE
        OverrideArtifactName: true
      Name: !Join ['-', [ !Ref ApplicationName, 'build']]
      ServiceRole:
        Fn::ImportValue: !Join ['-', [!Ref ApplicationName, 'code-build']]
      LogsConfig:
        CloudWatchLogs:
          Status: DISABLED
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: 'aws/codebuild/amazonlinux2-x86_64-standard:5.0'
        Type: LINUX_CONTAINER
      Source:
        BuildSpec: 'aws-resources/cicd/buildspec.yaml'
        Type: CODEPIPELINE
      TimeoutInMinutes: 10

  CodeBuildProjectDeploy:
    Type: AWS::CodeBuild::Project
    Properties:
      Artifacts:
        Type: CODEPIPELINE
        OverrideArtifactName: true
      Name: !Join ['-', [ !Ref ApplicationName, 'deploy']]
      ServiceRole:
        Fn::ImportValue: !Join ['-', [!Ref ApplicationName, 'code-build']]
      LogsConfig:
        CloudWatchLogs:
          Status: DISABLED
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: 'aws/codebuild/amazonlinux2-x86_64-standard:3.0'
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: 'BucketName'
            Type: PLAINTEXT
            Value:
              Fn::ImportValue: !Join ['-', [!Ref ApplicationName, 'source']]
      Source:
        BuildSpec: 'aws-resources/cicd/deployspec.yaml'
        Type: CODEPIPELINE
      TimeoutInMinutes: 10

  SourceCodeArtifactsRepository:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join ['-', [ !Ref ApplicationName, 'artifacts' ]]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  SourceCodeArtifactsRepositoryPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SourceCodeArtifactsRepository
      PolicyDocument:
        Statement:
          - Action:
              - 's3:PutObject'
              - 's3:GetObject'
            Effect: 'Allow'
            Principal:
              Service: codebuild.amazonaws.com
            Resource:
              Fn::Join:
                - ''
                - - 'arn:aws:s3:::'
                  - !Ref SourceCodeArtifactsRepository
                  - '/*'

  GithubConnection: 
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Ref ApplicationName
      ProviderType: GitHub

  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref ApplicationName
      RoleArn:
        Fn::ImportValue: !Join ['-', [!Ref ApplicationName, 'code-pipeline']]
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Version: 1
                Provider: CodeStarSourceConnection
              RunOrder: 1
              Configuration:
                ConnectionArn: !GetAtt GithubConnection.ConnectionArn
                FullRepositoryId: !Sub '${GithubUserName}/${GithubRepositoryName}'
                BranchName: 'main'
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: Build
              InputArtifacts:
                - Name: SourceOutput
              ActionTypeId:
                Category: Build
                Owner: AWS
                Version: 1
                Provider: CodeBuild
              Configuration:
                ProjectName: !Ref CodeBuildProjectBuild
              RunOrder: 1
              OutputArtifacts:
                - Name: BuildOutput
        - Name: Deploy
          Actions:
            - Name: Deploy
              InputArtifacts:
                - Name: BuildOutput
              ActionTypeId:
                Category: Build
                Owner: AWS
                Version: 1
                Provider: CodeBuild
              RunOrder: 1
              Configuration:
                ProjectName: !Ref CodeBuildProjectDeploy
      ArtifactStore:
        Type: S3
        Location: !Ref SourceCodeArtifactsRepository